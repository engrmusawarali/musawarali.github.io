version: "3.8"

services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile
    image: al-folio:latest
    container_name: al-folio-dev
    ports:
      - "8080:8080"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
      - /srv/jekyll/.jekyll-cache
      - /srv/jekyll/node_modules
    environment:
      - JEKYLL_ENV=development
    stdin_open: true
    tty: true
    command: bundle exec jekyll serve --host 0.0.0.0 --port 8080 --livereload --strict_front_matter
